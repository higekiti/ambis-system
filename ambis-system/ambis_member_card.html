に迷ったら、入会時に道場長に相談するのが一番確実です。貸し出し用の道着もありますので、まずはクラスで聞いてみてください。</div>

<script>
// ── DATA ──
const beltMap={
  white:{label:'白帯',bar:'b-white',pill:'bw'},
  blue:{label:'青帯',bar:'b-blue',pill:'bb'},
  purple:{label:'紫帯',bar:'b-purple',pill:'bpu'},
  brown:{label:'茶帯',bar:'b-brown',pill:'bbr'},
  black:{label:'黒帯',bar:'b-black',pill:'bbl'},
};

const params=new URLSearchParams(location.search);
const memberId=params.get('id');

let members=JSON.parse(localStorage.getItem('ambis_members')||'[]');
let attendance=JSON.parse(localStorage.getItem('ambis_attendance')||'[]');
let tournaments=JSON.parse(localStorage.getItem('ambis_tournaments')||'[]');

let currentTournamentLeague='jbjjf';

// ── DRAWER ──
function toggleDrawer(){
  const btn=document.getElementById('menu-btn');
  const drawer=document.getElementById('drawer');
  const overlay=document.getElementById('drawer-overlay');
  btn.classList.toggle('open');
  drawer.classList.toggle('open');
  overlay.classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('menu-btn').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── PAGE NAV ──
function showPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  if(el) el.classList.add('active');
  closeDrawer();
  if(page==='members') renderMemberList();
  if(page==='tournament') renderTournaments();
  if(page==='news') renderNewsMember();
  if(page==='milestone') renderMilestone();
  if(page==='schedule') renderSchedule();
  if(page==='record') renderRecord();
}

// ── MEMBER CARD ──
function stripesDots(n,size=8){
  return [0,1,2,3].map(i=>`<div class="sd${i<n?'':' e'}" style="width:${size}px;height:${size}px;"></div>`).join('');
}
function beltPill(key){
  const b=beltMap[key]||beltMap.white;
  return `<span class="bp ${b.pill}"><span class="bpd"></span>${b.label}</span>`;
}
function tenure(joindate){
  if(!joindate) return '―';
  const ms=new Date()-new Date(joindate);
  const months=Math.floor(ms/(1000*60*60*24*30.44));
  return months<12?`${months}M`:`${(months/12).toFixed(1)}Y`;
}

function buildCalendar(memberId,myAtt){
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const months=[];
  for(let i=2;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:`${d.getMonth()+1}月`,y:d.getFullYear(),m:d.getMonth()});
  }
  const curKey=months[2].key;
  const tabs=months.map(mo=>`<div class="mtab${mo.key===curKey?' active':''}" onclick="switchMonth('${mo.key}',this)">${mo.label}</div>`).join('');
  const cals=months.map(mo=>{
    const attDates=new Set(myAtt.filter(a=>a.date&&a.date.startsWith(mo.key)).map(a=>a.date));
    const mCount=attDates.size;
    const total=myAtt.length;
    const firstDay=new Date(mo.y,mo.m,1).getDay();
    const days=new Date(mo.y,mo.m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDay;i++) cells+=`<div></div>`;
    for(let d=1;d<=days;d++){
      const ds=`${mo.y}-${String(mo.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const schedule=JSON.parse(localStorage.getItem('ambis_schedule')||'null')||[];
      const dow=new Date(ds).getDay();
      const hasClass=schedule.some(s=>s.dow===dow);
      const weekCls=dow===0?' sun':dow===6?' sat':'';
      cells+=`<div class="cday${attDates.has(ds)?' att':''}${hasClass?' has-class':''}${ds===todayStr?' tod':''}${weekCls}">${d}</div>`;
    }
    return `<div class="cal-wrap${mo.key===curKey?' show':''}" id="cal-${mo.key}">
      <div class="day-labels"><div class="day-lbl" style="color:#e74c3c;">日</div><div class="day-lbl">月</div><div class="day-lbl">火</div><div class="day-lbl">水</div><div class="day-lbl">木</div><div class="day-lbl">金</div><div class="day-lbl" style="color:#3a5fc8;">土</div></div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-summary">
        <div class="csitem"><div class="csv2">${mCount}</div><div class="csl">今月出席</div></div>
        <div class="csitem"><div class="csv2">${total}</div><div class="csl">累計出席</div></div>
      </div>
      <div style="display:flex;gap:14px;padding:0 16px 12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text-muted);">
          <div style="width:14px;height:14px;border-radius:50%;background:var(--navy);"></div>出席した日
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text-muted);">
          <div style="width:14px;height:14px;border-radius:50%;border:1.5px solid #c8d4f0;"></div>クラスがある日
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="sec-card"><div class="sec-head">ATTENDANCE</div><div class="month-tabs">${tabs}</div>${cals}</div>`;
}

function switchMonth(key,el){
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.cal-wrap').forEach(c=>c.classList.remove('show'));
  el.classList.add('active');
  const cal=document.getElementById('cal-'+key);
  if(cal) cal.classList.add('show');
}

function showQRModal(id,name){
  document.getElementById('qm-name').textContent=name;
  document.getElementById('qm-id').textContent=id;
  const canvas=document.getElementById('qm-canvas');
  canvas.innerHTML='';
  const url=`${location.origin}${location.pathname}?id=${id}`;
  new QRCode(canvas,{text:url,width:200,height:200,colorDark:'#0a1628',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('qr-overlay').classList.add('open');
}

function getNextClassInfo(){const now=new Date();for(let i=0;i<21;i++){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+i);const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const classes=getClassesForDate(ds).slice().sort((a,b)=>a.start.localeCompare(b.start));for(const c of classes){if(i===0){const p=c.start.split(':').map(Number);const hh=p[0],mm=p[1];const classStart=new Date(d.getFullYear(),d.getMonth(),d.getDate(),hh,mm,0,0);if(classStart<=now){continue;}}return {date:ds,cls:c};}}return null;}function nextClassBannerHTML(){const next=getNextClassInfo();if(!next){return '';}const dp=next.date.split('-').map(Number);const y=dp[0],m=dp[1],dd=dp[2];const d=new Date(y,m-1,dd);const dowLabel=['日','月','火','水','木','金','土'][d.getDay()];const today=new Date();const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;const tmr=new Date(today.getFullYear(),today.getMonth(),today.getDate()+1);const tmrStr=`${tmr.getFullYear()}-${String(tmr.getMonth()+1).padStart(2,'0')}-${String(tmr.getDate()).padStart(2,'0')}`;const dateLabel=next.date===todayStr?'本日':(next.date===tmrStr?'明日':`${m}月${dd}日(${dowLabel})`);const badge=next.cls.status==='change'?'<span style="font-size:11px;color:#c9a96e;margin-left:4px;">（時間変更）</span>':(next.cls.status==='extra'?'<span style="font-size:11px;color:#c9a96e;margin-left:4px;">（臨時開催）</span>':'');return `<div class="sec-card" style="margin-bottom:12px;"><div class="sec-head">NEXT CLASS</div><div style="padding:16px 20px;text-align:center;"><div style="font-size:19px;font-weight:700;color:var(--navy);">${dateLabel}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px;">${next.cls.start}〜${next.cls.end}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--gold);margin-top:6px;">${next.cls.name}</div>${badge}</div></div>`;}function initCard(){
  const content=document.getElementById('card-content');
  // ログイン済みの場合はloggedInMemberIdを優先
  const resolvedId = window.loggedInMemberId || memberId;
  let member=resolvedId?members.find(m=>m.id===resolvedId):members.find(m=>m.status==='active');
  if(!member){
    content.innerHTML=`<div class="not-found"><div class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg></div><p>会員情報が見つかりません。<br>管理者にお問い合わせください。</p></div>`;
    return;
  }
  document.getElementById('drawer-member-name').textContent=member.name;
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisYear=String(now.getFullYear());
  const myAtt=attendance.filter(a=>a.memberId===member.id);
  const monthCount=myAtt.filter(a=>a.date&&a.date.startsWith(ym)).length;
  const yearCount=myAtt.filter(a=>a.date&&a.date.startsWith(thisYear)).length;
  const belt=beltMap[member.belt]||beltMap.white;
  const avatarHTML=member.photo?`<img src="${member.photo}" alt="">`:(member.name||'').slice(0,2);

  const cardHTML=`
  <div class="member-card">
    <div class="accent-line"></div>
    <div class="card-header">
      <div><div class="brand-name">AMBIs</div><div class="brand-sub-sm">JIU-JITSU ACADEMY · KUMAMOTO</div></div>
      <div class="member-badge">MEMBER</div>
    </div>
    <div class="card-body">
      <div class="avatar">${avatarHTML}</div>
      <div class="member-info">
        <div class="m-name">${member.name}</div>
        <div class="m-kana">${member.kana||member.id}</div>
        <div class="belt-row"><span class="belt-bar ${belt.bar}"></span><span class="belt-lbl">${belt.label}</span></div>
        <div class="stripes-row">${stripesDots(member.stripe||0)}</div>
      </div>
    </div>
    <div class="card-divider"></div>
    <div class="card-stats">
      <div class="si"><div class="sv">${yearCount}</div><div class="sl">${thisYear}年</div></div>
      <div class="si"><div class="sv">${monthCount}</div><div class="sl">今月</div></div>
      <div class="si"><div class="sv">${tenure(member.joindate)}</div><div class="sl">在籍期間</div></div>
    </div>
    <div class="card-footer">
      <div class="fi">
        <span class="fl">MEMBER ID</span>
        <span class="fid">${member.id}</span>
        <div style="margin-top:5px;"><span class="fl">入会日　</span><span class="fdv">${member.joindate?member.joindate.replace(/-/g,'.'):'―'}</span></div>
      </div>
      <div class="qr-box" onclick="showQRModal('${member.id}','${member.name}')" id="mini-qr"></div>
    </div>
  </div>`;

  const myBH=[...JSON.parse(localStorage.getItem('ambis_belt_history')||'[]')].filter(h=>h.memberId===member.id).sort((a,b)=>b.date.localeCompare(a.date));
  let beltHTML='';
  if(myBH.length){
    const rows=myBH.map(h=>`
      <div class="bh-row">
        <div class="bh-date">${h.date}</div>
        ${beltPill(h.from)}<div class="bh-arrow">→</div>${beltPill(h.to)}
        <div style="display:flex;gap:2px;">${stripesDots(h.stripe||0,7)}</div>
        ${h.note?`<div class="bh-note">/ ${h.note}</div>`:''}
      </div>`).join('');
    beltHTML=`<div class="sec-card"><div class="sec-head">BELT HISTORY</div>${rows}</div>`;
  }

  content.innerHTML=nextClassBannerHTML()+cardHTML+beltHTML+buildCalendar(member.id,myAtt);
  setTimeout(()=>{
    const mini=document.getElementById('mini-qr');
    if(mini){
      const url=`${location.origin}${location.pathname}?id=${member.id}`;
      new QRCode(mini,{text:url,width:54,height:54,colorDark:'#0a1628',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
    }
  },150);
}

// ── MEMBER LIST ──
function renderMemberList(){
  const active=members.filter(m=>m.status==='active').sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  const body=document.getElementById('member-list-body');
  if(!active.length){body.innerHTML=`<div class="empty-msg">会員が登録されていません</div>`;return;}
  body.innerHTML=active.map(m=>{
    const belt=beltMap[m.belt]||beltMap.white;
    const av=m.photo?`<img src="${m.photo}" alt="">`:(m.name||'').slice(0,2);
    const stripes=[0,1,2,3].map(i=>`<div class="sd${i<(m.stripe||0)?'':' e'}" style="width:6px;height:6px;"></div>`).join('');
    return `<div class="ml-row">
      <div class="ml-avatar">${av}</div>
      <div class="ml-info">
        <div class="ml-name">${m.name}</div>
        <div class="ml-sub">${m.id} · 入会 ${m.joindate||'―'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="ml-belt bp ${belt.pill}"><span class="bpd"></span>${belt.label}</span>
        <div style="display:flex;gap:2px;">${stripes}</div>
      </div>
    </div>`;
  }).join('');
}

// ── TOURNAMENT ──
function switchLeague(league,el){
  currentTournamentLeague=league;
  document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.league-content').forEach(c=>c.classList.remove('show'));
  el.classList.add('active');
  document.getElementById('lc-'+league).classList.add('show');
  renderTournaments();
}

function renderTournaments(){
  ['jbjjf','asjjf'].forEach(league=>{
    const el=document.getElementById(league+'-events');
    if(!el) return;
    const now=new Date().toISOString().slice(0,10);
    const list=tournaments.filter(t=>t.league===league&&t.date>=now).sort((a,b)=>a.date.localeCompare(b.date));
    if(!list.length){el.innerHTML=`<div class="empty-msg" style="padding:12px 0 8px;">登録された大会はありません</div>`;return;}
    el.innerHTML=list.map(t=>`
      <div class="tournament-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="t-date">${t.date}</div>
          <button class="btn-danger-sm" onclick="deleteTournament('${t.id}')">削除</button>
        </div>
        <div class="t-name">${t.name}</div>
        <div class="t-meta">
          ${t.venue?`<span class="t-tag"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:2px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${t.venue}</span>`:''}
          ${t.category?`<span class="t-tag">${t.category}</span>`:''}
          ${t.note&&t.note.startsWith('http')?`<a href="${t.note}" target="_blank" style="font-size:10px;color:#3a5fc8;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:2px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>詳細</a>`:''}
          ${t.note&&!t.note.startsWith('http')?`<span class="t-tag">${t.note}</span>`:''}
        </div>
      </div>`).join('');
  });
}

function openAddTournament(league){
  currentTournamentLeague=league;
  document.getElementById('t-name').value='';
  document.getElementById('t-date').value='';
  document.getElementById('t-venue').value='';
  document.getElementById('t-category').value='';
  document.getElementById('t-note').value='';
  document.getElementById('modal-tournament').classList.add('open');
}

function saveTournament(){
  const name=document.getElementById('t-name').value.trim();
  const date=document.getElementById('t-date').value;
  if(!name||!date){alert('大会名と日付を入力してください');return;}
  tournaments.push({
    id:'t-'+Date.now(),
    league:currentTournamentLeague,
    name,date,
    venue:document.getElementById('t-venue').value.trim(),
    category:document.getElementById('t-category').value.trim(),
    note:document.getElementById('t-note').value.trim(),
  });
  localStorage.setItem('ambis_tournaments',JSON.stringify(tournaments));
  document.getElementById('modal-tournament').classList.remove('open');
  renderTournaments();
}

function deleteTournament(id){
  tournaments=tournaments.filter(t=>t.id!==id);
  localStorage.setItem('ambis_tournaments',JSON.stringify(tournaments));
  renderTournaments();
}

// ── RULES ──
function switchRules(tab,el){
  document.querySelectorAll('#page-rules .rltab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#page-rules .rules-content').forEach(c=>c.classList.remove('show'));
  el.classList.add('active');
  document.getElementById('rc-'+tab).classList.add('show');
}
function switchGiShop(tab,el){
  document.querySelectorAll('#page-gishop .rltab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#page-gishop .rules-content').forEach(c=>c.classList.remove('show'));
  el.classList.add('active');
  document.getElementById('gs-'+tab).classList.add('show');
}

// ── NEWS ──
function renderNewsMember(){
  const news=JSON.parse(localStorage.getItem('ambis_news')||'[]');
  const body=document.getElementById('news-body-member');
  if(!body) return;
  const sorted=[...news].sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  if(!sorted.length){body.innerHTML='<div class="empty-msg">まだニュースはありません</div>';return;}
  const catCls={info:'news-cat-info',result:'news-cat-result',event:'news-cat-event',schedule:'news-cat-schedule',other:'news-cat-other'};
  const catLabel={info:'お知らせ',result:'試合結果',event:'イベント',schedule:'スケジュール変更',other:'その他'};
  body.innerHTML=sorted.map(n=>`
    <div class="news-item">
      <div class="news-cat ${catCls[n.category]||'news-cat-other'}">${catLabel[n.category]||n.category}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-body">${n.body}</div>
      <div class="news-footer">
        <div class="news-date">${n.createdAt}</div>
        ${n.lineUrl?`<a href="${n.lineUrl}" target="_blank" class="news-line-btn">LINEで確認</a>`:''}
      </div>
    </div>`).join('');
}

// ── MILESTONE ──
function renderMilestone(){
  const grid=document.getElementById('milestone-grid');
  const progress=document.getElementById('milestone-progress');
  if(!grid||!progress) return;

  const member=memberId?members.find(m=>m.id===memberId):members.find(m=>m.status==='active');
  if(!member){grid.innerHTML='<div class="empty-msg">会員情報がありません</div>';return;}

  const myAtt=attendance.filter(a=>a.memberId===member.id);
  const total=myAtt.length;
  const now=new Date();
  const joinDate=member.joindate?new Date(member.joindate):null;
  const months=joinDate?Math.floor((now-joinDate)/(1000*60*60*24*30.44)):0;
  const years=months/12;

  const badges=[
    {id:'att10',icon:'🌱',name:'FIRST STEPS',desc:'累計10回出席',earned:total>=10,progress:Math.min(total,10),max:10,unit:'回'},
    {id:'att50',icon:'🔥',name:'DEDICATED',desc:'累計50回出席',earned:total>=50,progress:Math.min(total,50),max:50,unit:'回'},
    {id:'att100',icon:'💯',name:'CENTURY',desc:'累計100回出席',earned:total>=100,progress:Math.min(total,100),max:100,unit:'回'},
    {id:'att200',icon:'⚡',name:'WARRIOR',desc:'累計200回出席',earned:total>=200,progress:Math.min(total,200),max:200,unit:'回'},
    {id:'year1',icon:'🥋',name:'ONE YEAR',desc:'在籍1年',earned:years>=1,progress:Math.min(months,12),max:12,unit:'ヶ月'},
    {id:'year2',icon:'🏆',name:'TWO YEARS',desc:'在籍2年',earned:years>=2,progress:Math.min(months,24),max:24,unit:'ヶ月'},
    {id:'stripe1',icon:'⭐',name:'FIRST STRIPE',desc:'初めてのストライプ',earned:(member.stripe||0)>=1,progress:Math.min(member.stripe||0,1),max:1,unit:'本'},
    {id:'belt',icon:'🎯',name:'BELT UP',desc:'初めての帯昇格',earned:member.belt!=='white',progress:member.belt!=='white'?1:0,max:1,unit:''},
  ];

  grid.innerHTML=badges.map(b=>`
    <div class="badge-item ${b.earned?'earned':'locked'}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
      ${b.earned
        ?`<div class="badge-earned-label">✓ 達成！</div>`
        :`<div class="badge-locked-label">${b.progress}/${b.max}${b.unit}</div>`}
    </div>`).join('');

  // プログレスバー（未達成のもの）
  const inProgress=badges.filter(b=>!b.earned&&b.progress>0);
  if(inProgress.length){
    progress.innerHTML=`<div class="mp-label">PROGRESS</div>`+inProgress.map(b=>{
      const pct=Math.round((b.progress/b.max)*100);
      return `<div class="mp-row">
        <div class="mp-name">${b.icon} ${b.name}</div>
        <div class="mp-bar-wrap"><div class="mp-bar" style="width:${pct}%"></div></div>
        <div class="mp-val">${b.progress}/${b.max}</div>
      </div>`;
    }).join('');
  } else {
    progress.innerHTML='';
  }
}

// ── SCHEDULE ──
// 道場のクラススケジュール（管理アプリで編集・反映）
function getClassSchedule(){
  const stored=JSON.parse(localStorage.getItem('ambis_schedule')||'null');
  if(stored&&stored.length) return stored;
  return [
    {id:'d1',dow:1,name:'初心者クラス',start:'19:00',end:'20:00',type:'beginner'},
    {id:'d2',dow:1,name:'オールレベルクラス',start:'20:00',end:'21:00',type:'all'},
    {id:'d3',dow:3,name:'初心者クラス',start:'19:00',end:'20:00',type:'beginner'},
    {id:'d4',dow:3,name:'オールレベルクラス',start:'20:00',end:'21:00',type:'all'},
    {id:'d5',dow:5,name:'フリーマット',start:'19:00',end:'21:00',type:'free'},
    {id:'d6',dow:6,name:'オールレベルクラス',start:'10:00',end:'11:30',type:'all'},
    {id:'d7',dow:6,name:'フリーマット',start:'11:30',end:'12:30',type:'free'},
  ];
}
function getExceptions(){
  return JSON.parse(localStorage.getItem('ambis_schedule_exceptions')||'[]');
}
// 特定日のクラス情報（臨時変更を反映済み）を返す
// 戻り値: [{name, start, end, type, status}]
//   status: 'normal' | 'cancel' | 'change' | 'extra'
function getClassesForDate(ds){
  const dow=new Date(ds).getDay();
  const schedule=getClassSchedule();
  const exceptions=getExceptions().filter(e=>e.date===ds);

  // 該当日の通常クラス
  let classes=schedule.filter(s=>s.dow===dow).map(s=>({...s,status:'normal'}));

  // 臨時変更を適用
  exceptions.forEach(exc=>{
    if(exc.type==='cancel'){
      // 休講: 対象クラスを除去（対象なし=全部）
      if(!exc.targetClass){
        classes=[];
      } else {
        classes=classes.filter(c=>c.name!==exc.targetClass);
      }
    } else if(exc.type==='change'){
      // 時間変更
      if(!exc.targetClass){
        classes=classes.map(c=>({...c,start:exc.newStart,end:exc.newEnd,status:'change'}));
      } else {
        classes=classes.map(c=>c.name===exc.targetClass
          ?{...c,start:exc.newStart,end:exc.newEnd,status:'change'}:c);
      }
    } else if(exc.type==='extra'){
      // 臨時開催
      classes.push({id:'extra-'+exc.id,name:exc.targetClass||'臨時開催',start:exc.newStart||'',end:exc.newEnd||'',type:'other',status:'extra'});
    }
  });
  return classes;
}
const typeColors={beginner:'#3a5fc8',all:'#27ae60',free:'#c9a96e',other:'#6a7a9a'};
const typeColorsCancelled={beginner:'#a0aec0',all:'#a0aec0',free:'#a0aec0',other:'#a0aec0'};
function getSchTypeFromName(name){
  if(name==='初心者クラス') return 'beginner';
  if(name==='オールレベルクラス') return 'all';
  if(name==='フリーマット') return 'free';
  return 'other';
}

function renderSchedule(){
  // 直近の臨時変更を上部に表示
  const excEl=document.getElementById('upcoming-exceptions');
  if(excEl){
    const today=new Date().toISOString().slice(0,10);
    const soon=new Date(); soon.setDate(soon.getDate()+14);
    const soonStr=soon.toISOString().slice(0,10);
    const upcoming=getExceptions()
      .filter(e=>e.date>=today&&e.date<=soonStr)
      .sort((a,b)=>a.date.localeCompare(b.date));
    if(upcoming.length){
      const excTypeLabel={cancel:'休講',change:'時間変更',extra:'臨時開催'};
      excEl.innerHTML=`<div style="margin:8px 16px 0;">${upcoming.map(e=>`
        <div style="background:#fff8e6;border-left:3px solid #c9a96e;border-radius:4px;padding:8px 12px;margin-bottom:6px;font-size:12px;">
          <span style="font-weight:500;">${e.date}</span>
          <span style="margin-left:8px;">${excTypeLabel[e.type]||e.type}</span>
          ${e.targetClass?`<span style="color:var(--text-muted);margin-left:6px;">（${e.targetClass}）</span>`:''}
          ${e.note?`<div style="color:var(--text-secondary);margin-top:2px;">${e.note}</div>`:''}
        </div>`).join('')}
      </div>`;
    } else {
      excEl.innerHTML='';
    }
  }
  const tabsEl=document.getElementById('schedule-tabs');
  const calsEl=document.getElementById('schedule-cals');
  const listEl=document.getElementById('class-schedule-list');
  if(!tabsEl||!calsEl||!listEl) return;

  const schedule=getClassSchedule();
  // 曜日ごとにグループ化
  const byDow={};
  schedule.forEach(s=>{
    if(!byDow[s.dow]) byDow[s.dow]=[];
    byDow[s.dow].push(s);
  });

  const now=new Date();
  const months=[];
  for(let i=0;i<3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    months.push({key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:`${d.getMonth()+1}月`,y:d.getFullYear(),m:d.getMonth()});
  }

  tabsEl.innerHTML=months.map((mo,i)=>`<div class="smtab${i===0?' active':''}" onclick="switchSchMonth('${mo.key}',this)">${mo.label}</div>`).join('');

  calsEl.innerHTML=months.map((mo,i)=>{
    const firstDay=new Date(mo.y,mo.m,1).getDay();
    const days=new Date(mo.y,mo.m+1,0).getDate();
    const todayStr=now.toISOString().slice(0,10);
    let cells='';
    for(let p=0;p<firstDay;p++) cells+=`<div></div>`;
    for(let d=1;d<=days;d++){
      const date=new Date(mo.y,mo.m,d);
      const dow=date.getDay();
      const ds=`${mo.y}-${String(mo.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` ;
      const dayClasses=getClassesForDate(ds);
      const isToday=ds===todayStr;
      const baseHasClass=byDow[dow]&&byDow[dow].length>0;
      const hasClass=dayClasses.length>0;
      const allCancelled=baseHasClass&&!hasClass;
      const dayDots=dayClasses.map(c=>{
        const type=c.type||getSchTypeFromName(c.name);
        const clr=c.status==='cancel'?'#a0aec0':typeColors[type]||'#c9a96e';
        const bdr=c.status==='change'?`border:1.5px solid ${clr};background:transparent;`:`background:${clr};`;
        return `<div class="sch-dot" style="${bdr}"></div>`;
      }).join('');
      const cancelDot=allCancelled?`<div class="sch-dots"><div class="sch-dot" style="background:#a0aec0;opacity:0.5;"></div></div>`:'';
      cells+=`<div class="sch-day${(hasClass||allCancelled)?' has-class':''}">${d}${hasClass?`<div class="sch-dots">${dayDots}</div>`:cancelDot}</div>`;
    }
    return `<div class="schedule-cal-wrap${i===0?' show':''}" id="sch-${mo.key}">
      <div class="sch-day-labels">${['日','月','火','水','木','金','土'].map(l=>`<div class="sch-day-lbl">${l}</div>`).join('')}</div>
      <div class="sch-grid">${cells}</div>
    </div>`;
  }).join('');

  // クラス一覧
  const dayNames=['日','月','火','水','木','金','土'];
  const sortedDows=Object.keys(byDow).map(Number).sort((a,b)=>a-b);
  if(!sortedDows.length){
    listEl.innerHTML=`<div class="empty-msg">クラス情報がまだ登録されていません</div>`;
    return;
  }
  listEl.innerHTML=sortedDows.map(dow=>{
    const classes=[...byDow[dow]].sort((a,b)=>a.start.localeCompare(b.start));
    return `<div style="margin-bottom:10px;">
      <div style="font-size:10px;letter-spacing:1px;color:var(--text-muted);margin-bottom:5px;">毎週${dayNames[dow]}曜日</div>
      ${classes.map(c=>`
        <div class="class-row">
          <div class="class-row-dot" style="background:${typeColors[c.type||getSchTypeFromName(c.name)]||'#ccc'};"></div>
          <div class="class-row-info">
            <div class="class-row-name">${c.name}</div>
            <div class="class-row-time">${c.start} - ${c.end}</div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function switchSchMonth(key,el){
  document.querySelectorAll('.smtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.schedule-cal-wrap').forEach(c=>c.classList.remove('show'));
  el.classList.add('active');
  const cal=document.getElementById('sch-'+key);
  if(cal) cal.classList.add('show');
}

// ── MATCH RECORD ──
let editingRecordId=null;
const recordResultLabel={gold:'🥇 優勝',silver:'🥈 準優勝',bronze:'🥉 3位',join:'出場'};
const recordResultCls={gold:'result-gold',silver:'result-silver',bronze:'result-bronze',join:'result-join'};
const recordLeagueLabel={jbjjf:'JBJJF',asjjf:'ASJJF',other:'その他'};

function getMyRecords(){
  const member=memberId?members.find(m=>m.id===memberId):members.find(m=>m.status==='active');
  if(!member) return [];
  const all=JSON.parse(localStorage.getItem('ambis_match_records')||'[]');
  return all.filter(r=>r.memberId===member.id);
}
function saveMyRecords(updated,memberId){
  const all=JSON.parse(localStorage.getItem('ambis_match_records')||'[]');
  const others=all.filter(r=>r.memberId!==memberId);
  localStorage.setItem('ambis_match_records',JSON.stringify([...others,...updated]));
}

function renderRecord(){
  const member=memberId?members.find(m=>m.id===memberId):members.find(m=>m.status==='active');
  const statsEl=document.getElementById('record-stats');
  const listEl=document.getElementById('record-list');
  if(!statsEl||!listEl||!member) return;

  const records=getMyRecords().sort((a,b)=>b.date.localeCompare(a.date));
  const gold=records.filter(r=>r.result==='gold').length;
  const silver=records.filter(r=>r.result==='silver').length;
  const bronze=records.filter(r=>r.result==='bronze').length;

  statsEl.innerHTML=`
    <div class="rs-item"><div class="rs-val">${records.length}</div><div class="rs-lbl">出場回数</div></div>
    <div class="rs-item"><div class="rs-val">🥇${gold}</div><div class="rs-lbl">優勝</div></div>
    <div class="rs-item"><div class="rs-val">🥈${silver}</div><div class="rs-lbl">準優勝</div></div>
    <div class="rs-item"><div class="rs-val">🥉${bronze}</div><div class="rs-lbl">3位</div></div>`;

  if(!records.length){
    listEl.innerHTML=`<div class="empty-msg">まだ戦歴がありません。<br>初めての試合を記録してみましょう。</div>`;
    return;
  }
  listEl.innerHTML=records.map(r=>`
    <div class="record-item">
      <div class="record-top">
        <span class="record-result ${recordResultCls[r.result]||'result-join'}">${recordResultLabel[r.result]||r.result}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="record-date">${r.date}</span>
          <div class="record-actions"><button class="record-edit-btn" onclick="openRecordModal('${r.id}')">編集</button></div>
        </div>
      </div>
      <div class="record-name">${r.name}</div>
      <div class="record-meta">
        ${r.league?`<span class="record-tag">${recordLeagueLabel[r.league]||r.league}</span>`:''}
        ${r.weight?`<span class="record-tag">${r.weight}</span>`:''}
        ${r.format?`<span class="record-tag">${r.format==='gi'?'道着':'ノーギ'}</span>`:''}
      </div>
      ${r.comment?`<div class="record-comment">${r.comment}</div>`:''}
    </div>`).join('');
}

function openRecordModal(id){
  editingRecordId=id||null;
  if(id){
    const records=getMyRecords();
    const r=records.find(x=>x.id===id);
    if(!r) return;
    document.getElementById('rm-title').textContent='試合結果を編集';
    document.getElementById('r-name').value=r.name;
    document.getElementById('r-date').value=r.date;
    document.getElementById('r-league').value=r.league||'';
    document.getElementById('r-weight').value=r.weight||'';
    document.getElementById('r-format').value=r.format||'gi';
    document.getElementById('r-result').value=r.result;
    document.getElementById('r-comment').value=r.comment||'';
    document.getElementById('r-delete-btn').style.display='inline-flex';
  } else {
    document.getElementById('rm-title').textContent='試合結果を記録';
    document.getElementById('r-name').value='';
    document.getElementById('r-date').value=new Date().toISOString().slice(0,10);
    document.getElementById('r-league').value='';
    document.getElementById('r-weight').value='';
    document.getElementById('r-format').value='gi';
    document.getElementById('r-result').value='join';
    document.getElementById('r-comment').value='';
    document.getElementById('r-delete-btn').style.display='none';
  }
  document.getElementById('rm-overlay').classList.add('open');
}
function closeRecordModal(){
  document.getElementById('rm-overlay').classList.remove('open');
}

function saveRecord(){
  const member=memberId?members.find(m=>m.id===memberId):members.find(m=>m.status==='active');
  if(!member) return;
  const name=document.getElementById('r-name').value.trim();
  const date=document.getElementById('r-date').value;
  if(!name||!date){alert('大会名と開催日を入力してください');return;}

  let records=getMyRecords();
  const data={
    memberId:member.id,
    name,date,
    league:document.getElementById('r-league').value,
    weight:document.getElementById('r-weight').value.trim(),
    format:document.getElementById('r-format').value,
    result:document.getElementById('r-result').value,
    comment:document.getElementById('r-comment').value.trim(),
  };
  if(editingRecordId){
    records=records.map(r=>r.id===editingRecordId?{...r,...data}:r);
  } else {
    records.push({id:'rec-'+Date.now(),...data});
  }
  saveMyRecords(records,member.id);
  closeRecordModal();
  renderRecord();
}

function deleteRecord(){
  const member=memberId?members.find(m=>m.id===memberId):members.find(m=>m.status==='active');
  if(!member||!editingRecordId) return;
  let records=getMyRecords().filter(r=>r.id!==editingRecordId);
  saveMyRecords(records,member.id);
  closeRecordModal();
  renderRecord();
}

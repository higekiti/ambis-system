<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"; import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBA3sfUh7i2gldOXaHILJYlS4cu3YmnIyg",
  authDomain: "ambis-jiu-jitsu.firebaseapp.com",
  projectId: "ambis-jiu-jitsu",
  storageBucket: "ambis-jiu-jitsu.firebasestorage.app",
  messagingSenderId: "950081158370",
  appId: "1:950081158370:web:8e33879ed3b429a99272bb"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp); const auth = getAuth(fbApp);

window.fbDb = db;
window.fbCollection = collection;
window.fbDoc = doc;
window.fbGetDocs = getDocs;
window.fbAddDoc = addDoc;
window.fbUpdateDoc = updateDoc;

// 起動時にFirestoreから会員・出席データを取得
window.addEventListener('load', async () => { try{await signInAnonymously(auth);}catch(e){console.warn('signInAnonymously failed:',e);}
  try {
    const [mSnap, aSnap] = await Promise.all([
      getDocs(collection(db, 'members')),
      getDocs(collection(db, 'attendance')),
    ]);
    const fbMembers = mSnap.docs.map(d => d.data());
    const fbAttendance = aSnap.docs.map(d => d.data());
    if(fbMembers.length)   { localStorage.setItem('ambis_members', JSON.stringify(fbMembers)); }
    if(fbAttendance.length){ localStorage.setItem('ambis_attendance', JSON.stringify(fbAttendance)); }
  } catch(e) {
    console.warn('Firebase load error:', e.message);
  }
  if(typeof initCheckin === 'function') initCheckin();
});
</script>
<style>
:root{
  --navy:#0a1628; --navy-mid:#1a2a48; --navy-light:#2a3a60;
  --gold:#c9a96e; --gold-light:#e8cfa0;
  --white:#fff;
  --bg:#f4f6fa;
  --card:#ffffff;
  --text-primary:#0a1628; --text-secondary:#6a7a9a; --text-muted:#aab0c0;
  --border:#e8eaf0;
  --success:var(--gold);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);overflow:hidden;}

.app{width:100%;height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.header{
  background:var(--navy);padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--gold);}
.header-sub{font-size:8px;letter-spacing:2px;color:#4a5a7a;margin-top:2px;}
.time-display{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:2px;}
.date-display{font-size:10px;color:#4a5a7a;text-align:right;margin-top:2px;}

/* MAIN */
.main-area{flex:1;display:flex;overflow:hidden;}

/* CAMERA SIDE */
.camera-side{
  flex:1;position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#e8ecf2;overflow:hidden;
}
.camera-label{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:1.5px;color:var(--text-secondary);
  background:rgba(255,255,255,0.9);padding:5px 16px;border-radius:20px;
  white-space:nowrap;z-index:10;
  box-shadow:0 2px 8px rgba(10,22,40,0.08);
}
#video{width:100%;height:100%;object-fit:cover;}
#canvas{display:none;}

/* SCAN FRAME */
.scan-frame{
  position:absolute;width:200px;height:200px;
  pointer-events:none;z-index:10;
}
.scan-corner-tl{position:absolute;top:0;left:0;width:24px;height:24px;border-top:3px solid var(--navy);border-left:3px solid var(--navy);border-radius:4px 0 0 0;}
.scan-corner-tr{position:absolute;top:0;right:0;width:24px;height:24px;border-top:3px solid var(--navy);border-right:3px solid var(--navy);border-radius:0 4px 0 0;}
.scan-corner-bl{position:absolute;bottom:0;left:0;width:24px;height:24px;border-bottom:3px solid var(--navy);border-left:3px solid var(--navy);border-radius:0 0 0 4px;}
.scan-corner-br{position:absolute;bottom:0;right:0;width:24px;height:24px;border-bottom:3px solid var(--navy);border-right:3px solid var(--navy);border-radius:0 0 4px 0;}
.scan-line{
  position:absolute;width:calc(100% - 16px);left:8px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:scan 2s linear infinite;z-index:11;
}
@keyframes scan{0%{top:8px;opacity:1;}90%{opacity:1;}100%{top:calc(100% - 8px);opacity:0;}}

.camera-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--text-muted);white-space:nowrap;z-index:10;
  background:rgba(255,255,255,0.8);padding:4px 14px;border-radius:20px;
}

/* SUCCESS FLASH */
.success-flash{
  display:none;position:absolute;inset:0;
  background:rgba(201,169,110,0.14);z-index:20;
  align-items:center;justify-content:center;flex-direction:column;gap:8px;
  animation:flash .7s ease-out forwards;
}
.success-flash.show{display:flex;}
@keyframes flash{0%{opacity:1;}100%{opacity:0;}}
.flash-icon{font-size:72px;color:var(--success);}
.flash-text{font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:500;color:var(--navy);letter-spacing:1px;margin-top:4px;}

.no-camera{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-muted);text-align:center;padding:20px;}
.no-camera .icon{font-size:40px;}
.no-camera p{font-size:12px;line-height:1.8;}

/* INFO SIDE */
.info-side{
  width:320px;background:var(--card);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  box-shadow:-4px 0 16px rgba(10,22,40,0.06);
}

/* STATUS PANEL */
.status-panel{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.panel-label{font-size:9px;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;}

.status-idle{text-align:center;padding:16px 0;}
.status-idle-icon{font-size:36px;margin-bottom:8px;}
.status-idle-text{font-size:12px;color:var(--text-muted);line-height:1.8;}

/* RESULT CARD */
.result-card{display:none;}
.result-card.show{display:block;}
.result-member{
  display:flex;align-items:center;gap:12px;
  background:var(--bg);border-radius:10px;padding:12px 14px;
  margin-bottom:14px;border:1px solid var(--border);
}
.result-avatar{
  width:48px;height:48px;border-radius:50%;
  background:#e8ecf2;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--navy);
  flex-shrink:0;overflow:hidden;
}
.result-avatar img{width:100%;height:100%;object-fit:cover;}
.result-name{font-size:15px;font-weight:500;color:var(--text-primary);}
.result-id{font-size:10px;color:var(--text-muted);margin-top:2px;}
.result-belt-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
.belt-bar{display:inline-block;width:28px;height:7px;border-radius:2px;}
.b-white{background:#ccc;}.b-blue{background:#3a5fc8;}.b-purple{background:#7c3aed;}.b-brown{background:#92400e;}.b-black{background:#111;}
.belt-lbl{font-size:10px;color:var(--text-secondary);}
.stripes-mini{display:flex;gap:2px;margin-top:4px;}
.sm{width:6px;height:6px;background:var(--gold);border-radius:1px;}
.sm.e{background:#e8eaf0;border:1px solid var(--border);}

.class-select-label{font-size:9px;letter-spacing:2px;color:var(--text-muted);margin-bottom:8px;}
.class-btns{display:flex;flex-direction:column;gap:6px;}
.class-btn{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--white);
  cursor:pointer;transition:all .15s;width:100%;
  font-family:'Noto Sans JP',sans-serif;text-align:left;
}
.class-btn:hover{border-color:var(--navy-light);background:#f8f9fc;}
.class-btn.selected{border-color:var(--navy);background:#f0f3fa;}
.class-btn-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.class-btn-title{font-size:12px;font-weight:500;color:var(--text-primary);}
.class-btn-sub{font-size:9px;color:var(--text-muted);margin-top:1px;}

.checkin-submit{
  width:100%;padding:13px;border-radius:8px;
  background:var(--navy);color:var(--gold);
  border:none;font-size:14px;font-weight:500;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;transition:all .15s;
  margin-top:12px;letter-spacing:1px;
}
.checkin-submit:hover{background:var(--navy-mid);}
.checkin-submit:disabled{background:#e8eaf0;color:var(--text-muted);cursor:not-allowed;}

/* LOG */
.log-section{flex:1;overflow-y:auto;padding:16px 20px;}
.log-label{font-size:9px;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;}
.log-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--navy);min-width:46px;}
.log-name{font-size:12px;color:var(--text-primary);flex:1;font-weight:500;}
.log-class{
  font-size:9px;padding:2px 7px;border-radius:3px;
  background:#f0f3fa;color:var(--text-secondary);white-space:nowrap;
}
.log-empty{font-size:11px;color:var(--text-muted);text-align:center;padding:24px 0;}

/* TODAY STAT */
.today-stat{
  display:flex;gap:0;padding:12px 20px;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg);
}
.ts-item{flex:1;text-align:center;}
.ts-item:not(:last-child){border-right:1px solid var(--border);}
.ts-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--navy);line-height:1;}
.ts-lbl{font-size:8px;color:var(--text-muted);margin-top:3px;letter-spacing:.5px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* RESPONSIVE — 縦画面（スマホ）対応 */
@media (max-width:860px){
  html,body{overflow-y:auto;height:auto;min-height:100vh;}
  .app{height:auto;min-height:100vh;}
  .main-area{flex-direction:column;overflow:visible;}
  .camera-side{width:100%;height:50vh;min-height:320px;flex-shrink:0;}
  .info-side{width:100%;border-left:none;border-top:1px solid var(--border);box-shadow:none;}
  .header{padding:10px 16px;}
  .header-brand{font-size:18px;}
  .header-sub{font-size:7px;}
  .time-display{font-size:22px;}
  .today-stat{flex-wrap:wrap;}
}
@media (max-width:480px){
  .camera-side{height:42vh;min-height:260px;}
  .scan-frame{width:160px;height:160px;}
  .status-panel{padding:16px 16px 12px;}
}
</style>

<script>
const beltMap={
  white:{label:'白帯',bar:'b-white'},
  blue:{label:'青帯',bar:'b-blue'},
  purple:{label:'紫帯',bar:'b-purple'},
  brown:{label:'茶帯',bar:'b-brown'},
  black:{label:'黒帯',bar:'b-black'},
};
const classInfo={
  beginner:{label:'初心者クラス',icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>'},
  all:{label:'オールレベル',icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>'},
  free:{label:'フリーマット',icon:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>'},
};

let members=[];
let attendance=[];
let currentMember=null;
let selectedClass=null;
let lastScanned='';
let lastScannedTime=0;

function loadData(){
  members=JSON.parse(localStorage.getItem('ambis_members')||'[]');
  attendance=JSON.parse(localStorage.getItem('ambis_attendance')||'[]');
}
function saveData(){
  localStorage.setItem('ambis_attendance',JSON.stringify(attendance));
  // Firestoreにも保存（非同期）
  if(window.fbDb){
    const newRecords = attendance.filter(a => a.date === getToday());
    newRecords.forEach(async (record) => {
      try {
        const ref = window.fbDoc(window.fbDb, 'attendance', record.id);
        await window.fbUpdateDoc(ref, record).catch(async () => {
          // ドキュメントが存在しない場合は新規作成
          const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
          await setDoc(ref, record);
        });
      } catch(e) { console.warn('Firestore save error:', e); showToast('⚠ クラウド同期に失敗しました（この端末には保存済み）','warn'); }
    });
  }
}
function getToday(){return new Date().toISOString().slice(0,10);}
function getTime(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

// CLOCK
function updateClock(){
  const now=new Date();
  document.getElementById('time-display').textContent=
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('date-display').textContent=
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} (${days[now.getDay()]})`;
}

// CAMERA
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    const video=document.getElementById('video');
    video.srcObject=stream;
    video.addEventListener('loadedmetadata',()=>{video.play();requestAnimationFrame(scanFrame);});
  }catch(e){
    document.getElementById('video').style.display='none';
    document.getElementById('scan-frame').style.display='none';
    document.getElementById('no-camera-msg').style.display='flex';
  }
}

function playTone(freq,duration,delay,type){try{if(!window.__ambisAudioCtx)window.__ambisAudioCtx=new (window.AudioContext||window.webkitAudioContext)();const ctx=window.__ambisAudioCtx;const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type||'sine';osc.frequency.value=freq;const startTime=ctx.currentTime+(delay||0);osc.connect(gain);gain.connect(ctx.destination);gain.gain.setValueAtTime(0.0001,startTime);gain.gain.exponentialRampToValueAtTime(0.2,startTime+0.01);gain.gain.exponentialRampToValueAtTime(0.0001,startTime+duration);osc.start(startTime);osc.stop(startTime+duration+0.05);}catch(e){console.error('sound error:',e);}}function playScanSound(){playTone(880,0.1,0,'sine');}function playCheckinSound(){playTone(659,0.12,0,'sine');playTone(880,0.16,0.11,'sine');}function scanFrame(){
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(video,0,0,canvas.width,canvas.height);
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
    if(code){
      const now=Date.now();
      if(code.data!==lastScanned||(now-lastScannedTime)>3000){
        lastScanned=code.data;lastScannedTime=now;
        handleQR(code.data);
      }
    }
  }
  requestAnimationFrame(scanFrame);
}

function handleQR(data){
  loadData();
  let memberId=null;
  try{const url=new URL(data);memberId=url.searchParams.get('id');}
  catch(e){if(data.startsWith('AMBIs-'))memberId=data;}
  if(!memberId)return;
  const member=members.find(m=>m.id===memberId&&m.status==='active');
  if(!member)return;if(currentMember&&currentMember.id===member.id)return;
  playScanSound();currentMember=member;selectedClass=null;
  showMemberPanel(member);
}

function showMemberPanel(member){
  const belt=beltMap[member.belt]||beltMap.white;
  document.getElementById('result-avatar').innerHTML=member.photo?`<img src="${member.photo}" alt="">`:(member.name||'').slice(0,2);
  document.getElementById('result-name').textContent=member.name;
  document.getElementById('result-id').textContent=member.id;
  document.getElementById('result-belt-bar').className='belt-bar '+belt.bar;
  document.getElementById('result-belt-lbl').textContent=belt.label;
  document.getElementById('result-stripes').innerHTML=[0,1,2,3].map(i=>`<div class="sm${i<(member.stripe||0)?'':' e'}"></div>`).join('');
  const today=getToday();
  const todayClasses=attendance.filter(a=>a.memberId===member.id&&a.date===today).map(a=>a.class);
  document.getElementById('class-btns').innerHTML=Object.entries(classInfo).map(([key,cls])=>{
    const done=todayClasses.includes(key);
    return `<button class="class-btn${done?' selected':''}" id="cls-${key}" onclick="selectClass('${key}')">
      <div class="class-btn-icon">${cls.icon}</div>
      <div>
        <div class="class-btn-title">${cls.label}${done?' <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
        <div class="class-btn-sub">${done?'本日登録済':'タップして選択'}</div>
      </div>
    </button>`;
  }).join('');
  document.getElementById('checkin-submit').disabled=true;
  document.getElementById('status-idle').style.display='none';
  document.getElementById('result-card').classList.add('show');
}

function selectClass(cls){
  selectedClass=cls;
  document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('selected'));
  const btn=document.getElementById('cls-'+cls);
  if(btn)btn.classList.add('selected');
  document.getElementById('checkin-submit').disabled=false;
}

function doCheckin(){
  if(!currentMember||!selectedClass)return;
  loadData();
  const today=getToday();
  if(attendance.find(a=>a.memberId===currentMember.id&&a.date===today&&a.class===selectedClass)){
    showToast(`${classInfo[selectedClass].label}は本日登録済みです`,'warn');return;
  }
  attendance.push({
    id:'att-'+Date.now(),memberId:currentMember.id,
    memberName:currentMember.name,class:selectedClass,date:today,time:getTime(),
  });
  saveData();playCheckinSound();
  const flash=document.getElementById('success-flash');
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),800);
  showToast(`${currentMember.name} — ${classInfo[selectedClass].label}`,'success');
  renderLog();
  setTimeout(()=>{
    currentMember=null;selectedClass=null;
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('status-idle').style.display='block';
  },1200);
}

function renderLog(){
  loadData();
  const today=getToday();
  const todayLog=[...attendance].filter(a=>a.date===today).reverse().slice(0,30);
  document.getElementById('stat-today').textContent=todayLog.length;
  document.getElementById('stat-beginner').textContent=todayLog.filter(a=>a.class==='beginner').length;
  document.getElementById('stat-all').textContent=todayLog.filter(a=>a.class==='all').length;
  document.getElementById('stat-free').textContent=todayLog.filter(a=>a.class==='free').length;
  const body=document.getElementById('log-body');
  if(!todayLog.length){body.innerHTML='<div class="log-empty">本日の記録はありません</div>';return;}
  body.innerHTML=todayLog.map(a=>`
    <div class="log-item">
      <div class="log-time">${a.time||'--:--'}</div>
      <div class="log-name">${a.memberName}</div>
      <div class="log-class">${classInfo[a.class]?.label||a.class}</div>
    </div>`).join('');
}

function showToast(msg,type='success'){
  const ex=document.getElementById('ci-toast');if(ex)ex.remove();
  const el=document.createElement('div');el.id='ci-toast';
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:${type==='success'?'#0a1628':'#e67e22'};color:${type==='success'?'#c9a96e':'#fff'};
    padding:10px 22px;border-radius:8px;font-size:13px;
    font-family:'Noto Sans JP',sans-serif;z-index:999;
    box-shadow:0 4px 16px rgba(10,22,40,0.15);white-space:nowrap;`;
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function initCheckin(){
  loadData();updateClock();
  setInterval(updateClock,1000);
  setInterval(()=>{loadData();renderLog();},5000);
  renderLog();startCamera();
}

window.addEventListener('load',()=>{
  // Firebase moduleが先にデータを読み込む場合はそちらからinitCheckinが呼ばれる
  // Firebase未接続の場合のフォールバック
  setTimeout(()=>{
    if(typeof window.fbDb === 'undefined') initCheckin();
  }, 2000);
});
</script>
</body>
</html>

// ══ MEMBERS ══
function renderMembers(data) {
  const tbody = document.getElementById('member-tbody');
  const empty = document.getElementById('empty-members');
  if(!data.length){ tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    const now = new Date();
    const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const thisYear = String(now.getFullYear());
    tbody.innerHTML = data.map(m=>{
      const belt=beltMap[m.belt]||beltMap.white;
      const status=statusMap[m.status]||statusMap.active;
      const stripes=[0,1,2,3].map(i=>`<div class="s-dot${i<m.stripe?'':' empty'}"></div>`).join('');
      const avatarContent=m.photo?`<img src="${m.photo}" alt="">`:(m.name||'').slice(0,2);
      const monthCount=attendance.filter(a=>a.memberId===m.id&&a.date&&a.date.startsWith(ym)).length;
      const yearCount=attendance.filter(a=>a.memberId===m.id&&a.date&&a.date.startsWith(thisYear)).length;
      const totalCount=attendance.filter(a=>a.memberId===m.id).length;
      return `<tr>
        <td><div class="member-cell"><div class="avatar">${avatarContent}</div><div class="member-name-cell"><div class="name">${m.name}</div><div class="id">${m.id}</div></div></div></td>
        <td><span class="belt-pill ${belt.cls}"><span class="belt-dot"></span>${belt.label}</span></td>
        <td><div class="stripes-cell">${stripes}</div></td>
        <td style="font-size:12px;color:var(--text-secondary);">${m.joindate||'―'}</td>
        <td style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--navy);">${yearCount}</td>
        <td style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);">${monthCount}</td>
        <td style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text-secondary);">${totalCount}</td>
        <td><span class="status-pill ${status.cls}">${status.label}</span></td>
        <td><div class="action-btns">
          <button class="btn btn-ghost btn-sm" onclick="openMemberModal('edit','${m.id}')">編集</button>
          <button class="btn btn-ghost btn-sm" onclick="showQR('${m.id}')">QR</button>
          <button class="btn btn-ghost btn-sm" onclick="openDeleteModal('${m.id}')">退会</button>
        </div></td>
      </tr>`;
    }).join('');
  }
  updateMemberStats();
}

function updateMemberStats(){
  const active=members.filter(m=>m.status==='active');
  const notActive=members.filter(m=>m.status!=='active');
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthTotal=attendance.filter(a=>a.date&&a.date.startsWith(ym)).length;
  document.getElementById('stat-total').textContent=members.length;
  document.getElementById('stat-active').textContent=active.length;
  document.getElementById('stat-month').textContent=monthTotal;
  document.getElementById('stat-inactive').textContent=notActive.length;
}

function filterMembers(){
  const q=document.getElementById('search-input').value.toLowerCase();
  renderMembers(members.filter(m=>m.name.toLowerCase().includes(q)||m.id.toLowerCase().includes(q)));
}

function renderAttendance(){
  if(!document.getElementById('att-today')) return;
  const filterMember=document.getElementById('att-filter-member').value;
  const filterMonth=document.getElementById('att-filter-month').value;

  let data=[...attendance].reverse();
  if(filterMember) data=data.filter(a=>a.memberId===filterMember);
  if(filterMonth)  data=data.filter(a=>a.date&&a.date.startsWith(filterMonth));

  const now=new Date();
  const today=now.toISOString().slice(0,10);
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisYear=String(now.getFullYear());
  const todayCount=attendance.filter(a=>a.date===today).length;
  const monthCount=attendance.filter(a=>a.date&&a.date.startsWith(ym)).length;
  const yearCount=attendance.filter(a=>a.date&&a.date.startsWith(thisYear)).length;
  const activeCount=members.filter(m=>m.status==='active').length;

  document.getElementById('att-today').textContent=todayCount;
  document.getElementById('att-month-total').textContent=monthCount;
  document.getElementById('att-year-total').textContent=yearCount;
  document.getElementById('att-avg').textContent=activeCount?Math.round(monthCount/activeCount):0;

  const classCounts={};
  attendance.filter(a=>a.date&&a.date.startsWith(ym)).forEach(a=>{classCounts[a.class]=(classCounts[a.class]||0)+1;});
  const topClass=Object.entries(classCounts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('att-top-class').textContent=topClass?(classMap[topClass[0]]?.label||topClass[0]):'―';

  document.getElementById('att-count-label').textContent=`${data.length}件`;
  const body=document.getElementById('att-log-body');
  if(!data.length){
    body.innerHTML=`<div class="empty-state"><div class="icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6"/><path d="M9 16h6"/></svg></div><p>出席記録がありません</p></div>`;
    return;
  }
  body.innerHTML=data.slice(0,100).map(a=>{
    const clsInfo=classMap[a.class]||{label:a.class,cls:''};
    return `<div class="att-row">
      <div class="att-time">${a.time||'―'}</div>
      <div style="flex:1"><div style="font-size:13px;font-weight:500;">${a.memberName}</div><div class="att-date-badge">${a.date}</div></div>
      <span class="att-class ${clsInfo.cls}">${clsInfo.label}</span>
      <button class="btn btn-ghost btn-sm" onclick="deleteAttendance('${a.id}')">削除</button>
    </div>`;
  }).join('');
}

function deleteAttendance(id){
  attendance=attendance.filter(a=>a.id!==id);
  saveAll(); renderAttendance(); renderMonthlyChart(); updateMemberStats();
  showToast('出席記録を削除しました');
}

function renderMonthlyChart(){
  const chart=document.getElementById('monthly-chart');
  if(!chart) return;
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=`${d.getMonth()+1}月`;
    const count=attendance.filter(a=>a.date&&a.date.startsWith(key)).length;
    months.push({label,count});
  }
  const max=Math.max(...months.map(m=>m.count),1);
  chart.innerHTML=months.map(m=>{
    const h=Math.round((m.count/max)*100);
    return `<div class="bar-col"><div class="bar-val">${m.count}</div><div class="bar" style="height:${h}px;"></div><div class="bar-label">${m.label}</div></div>`;
  }).join('');
}

// ══ PAYMENT ══
function renderPayment(){
  if(!document.getElementById('pay-income')) return;
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const label=`${now.getFullYear()}年${now.getMonth()+1}月`;
  document.getElementById('pay-month-label').textContent=label;

  const activeMembers=members.filter(m=>m.status==='active');
  const expected=activeMembers.reduce((s,m)=>s+(m.monthlyFee||MONTHLY_FEE),0);
  document.getElementById('pay-members').textContent=activeMembers.length;
  document.getElementById('pay-expected').textContent=expected.toLocaleString();

  // 支払いレコードを月ごとに自動生成（なければ）
  activeMembers.forEach(m=>{
    const exists=payments.find(p=>p.memberId===m.id&&p.month===ym);
    if(!exists) payments.push({id:'pay-'+m.id+'-'+ym,memberId:m.id,memberName:m.name,month:ym,status:'pending',monthlyFee:m.monthlyFee||MONTHLY_FEE,entryFee:0});
  });
  saveAll();

  const monthPays=payments.filter(p=>p.month===ym);
  const paid=monthPays.filter(p=>p.status==='paid');
  const unpaid=monthPays.filter(p=>p.status!=='paid');
  const income=paid.reduce((s,p)=>s+(p.monthlyFee||0),0);
  document.getElementById('pay-income').textContent=income.toLocaleString();
  document.getElementById('pay-unpaid').textContent=unpaid.length;

  document.getElementById('pay-tbody').innerHTML=activeMembers.map(m=>{
    const pay=payments.find(p=>p.memberId===m.id&&p.month===ym);
    const st=pay?pay.status:'pending';
    const stLabel=st==='paid'?'支払い済':st==='pending'?'未確認':'未払い';
    const stCls=st==='paid'?'pay-status-paid':st==='unpaid'?'pay-status-unpaid':'pay-status-pending';
    const fee=(m.monthlyFee||MONTHLY_FEE).toLocaleString();
    return `<tr>
      <td><div class="member-cell"><div class="avatar">${m.photo?`<img src="${m.photo}">`:(m.name||'').slice(0,2)}</div><div class="member-name-cell"><div class="name">${m.name}</div><div class="id">${m.id}</div></div></div></td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:18px;">¥${fee}</td>
      <td style="font-size:12px;color:var(--text-muted);">${m.entryFee?'¥'+m.entryFee.toLocaleString():'―'}</td>
      <td><span class="status-pill ${stCls}">${stLabel}</span></td>
      <td><div class="action-btns">
        ${st!=='paid'?`<button class="btn btn-success btn-sm" onclick="markPaid('${m.id}','${ym}')">支払い確認</button>`:''}
        ${st==='paid'?`<button class="btn btn-ghost btn-sm" onclick="markPaid('${m.id}','${ym}','pending')">取消</button>`:''}
      </div></td>
    </tr>`;
  }).join('');
}

function markPaid(memberId,month,toStatus){
  const idx=payments.findIndex(p=>p.memberId===memberId&&p.month===month);
  if(idx!==-1) payments[idx].status=toStatus||'paid';
  saveAll(); renderPayment();
  showToast(toStatus==='pending'?'支払い確認を取消しました':'支払いを確認しました');
}

// ══ SCHEDULE MANAGEMENT ══
const dowNames=['日','月','火','水','木','金','土'];
const schClassMap={
  beginner:{label:'初心者クラス',color:'#3a5fc8',bg:'#eef2ff'},
  all:     {label:'オールレベルクラス',color:'#27ae60',bg:'#eafaf1'},
  free:    {label:'フリーマット',color:'#c9a96e',bg:'#fff8e6'},
  other:   {label:'その他',color:'#6a7a9a',bg:'#f5f5f5'},
};
function getSchType(name){
  if(name==='初心者クラス') return 'beginner';
  if(name==='オールレベルクラス') return 'all';
  if(name==='フリーマット') return 'free';
  return 'other';
}
function getSchStyle(name){
  return schClassMap[getSchType(name)]||schClassMap.other;
}
function toggleSchOther(){
  var sel=document.getElementById('sch-name-sel');
  var row=document.getElementById('sch-other-row');
  if(sel&&row) row.style.display=(sel.value==='other')?'block':'none';
}
function renderWeeklySchedule(){
  var wrap=document.getElementById('weekly-schedule-view');
  if(!wrap) return;
  if(!classSchedule.length){
    wrap.innerHTML='<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:16px 0;">クラスが登録されていません</div>';
    return;
  }
  var activeDays=[1,2,3,4,5,6,0].filter(function(d){return classSchedule.some(function(s){return s.dow===d;});});
  if(!activeDays.length){wrap.innerHTML='';return;}
  var html='<div style="display:grid;grid-template-columns:repeat('+activeDays.length+',1fr);gap:8px;">';
  activeDays.forEach(function(dow){
    var dayClasses=classSchedule.filter(function(s){return s.dow===dow;}).sort(function(a,b){return a.start.localeCompare(b.start);});
    html+='<div><div style="font-size:10px;font-weight:500;color:var(--text-muted);letter-spacing:1px;text-align:center;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);">'+dowNames[dow]+'曜日</div>';
    dayClasses.forEach(function(c){
      var st=getSchStyle(c.name);
      html+='<div style="background:'+st.bg+';border-left:3px solid '+st.color+';border-radius:4px;padding:7px 8px;margin-bottom:6px;">'
           +'<div style="font-size:11px;font-weight:500;color:'+st.color+';">'+c.name+'</div>'
           +'<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">'+c.start+' - '+c.end+'</div></div>';
    });
    html+='</div>';
  });
  wrap.innerHTML=html+'</div>';
}
function renderSchedule(){
  var tbody=document.getElementById('schedule-tbody');
  var empty=document.getElementById('empty-schedule');
  if(!tbody) return;
  renderWeeklySchedule();
  var sorted=classSchedule.slice().sort(function(a,b){return a.dow-b.dow||a.start.localeCompare(b.start);});
  tbody.innerHTML='';
  if(!sorted.length){if(empty) empty.style.display='block';return;}
  if(empty) empty.style.display='none';
  sorted.forEach(function(s){
    var st=getSchStyle(s.name);
    var tr=document.createElement('tr');
    var td1=document.createElement('td'); td1.style.fontWeight='500'; td1.textContent=dowNames[s.dow]+'曜日';
    var td2=document.createElement('td');
    var sp=document.createElement('span');
    sp.style.cssText='display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:3px 9px;border-radius:4px;background:'+st.bg+';color:'+st.color;
    var dot=document.createElement('span'); dot.style.cssText='width:7px;height:7px;border-radius:1px;background:'+st.color+';flex-shrink:0;display:inline-block';
    sp.appendChild(dot); sp.appendChild(document.createTextNode(s.name)); td2.appendChild(sp);
    var td3=document.createElement('td'); td3.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--navy)"; td3.textContent=s.start+' - '+s.end;
    var td4=document.createElement('td');
    var bw=document.createElement('div'); bw.className='action-btns';
    var eb=document.createElement('button'); eb.className='btn btn-ghost btn-sm'; eb.textContent='編集';
    (function(id){eb.addEventListener('click',function(){openScheduleModal(id);});})(s.id);
    var db=document.createElement('button'); db.className='btn btn-ghost btn-sm'; db.textContent='削除';
    (function(id){db.addEventListener('click',function(){deleteSchedule(id);});})(s.id);
    bw.appendChild(eb); bw.appendChild(db); td4.appendChild(bw);
    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4);
    tbody.appendChild(tr);
  });
}
function closeScheduleModal(){
  document.getElementById('modal-schedule').classList.remove('open');

}
function openScheduleModal(editId){

function saveSchedule(){
  var nameSel=document.getElementById('sch-name-sel').value;
  var name='';
  if(nameSel==='beginner') name='初心者クラス';
  else if(nameSel==='all') name='オールレベルクラス';
  else if(nameSel==='free') name='フリーマット';
  else name=document.getElementById('sch-other-name').value.trim();
  var start=document.getElementById('sch-start').value;
  var end=document.getElementById('sch-end').value;
  if(!name){showToast('クラス名を入力してください');return;}
  if(!start||!end){showToast('時間を選択してください');return;}
  if(editingScheduleId){
    var idx=classSchedule.findIndex(function(s){return s.id===editingScheduleId;});
    if(idx!==-1) classSchedule[idx]={id:editingScheduleId,dow:parseInt(document.getElementById('sch-dow').value),name:name,start:start,end:end,type:getSchType(name)};
    showToast('クラスを更新しました');
  } else {
    classSchedule.push({id:'sch-'+Date.now(),dow:parseInt(document.getElementById('sch-dow').value),name:name,start:start,end:end,type:getSchType(name)});
    showToast('クラスを追加しました');
  }
  saveAll();
  closeScheduleModal();
  renderSchedule();
}
function deleteSchedule(id){
  classSchedule=classSchedule.filter(function(s){return s.id!==id;});
  saveAll(); renderSchedule();
  showToast('クラスを削除しました');
}
function deleteScheduleFromModal(){
  if(!editingScheduleId) return;
  deleteSchedule(editingScheduleId);
  closeScheduleModal();
}

function timeRangesOverlap(start1,end1,start2,end2){
  return start1<end2 && start2<end1;
}

function saveRentalBooking(){
  const customerName=document.getElementById('rb-name').value.trim();
  const customerPhone=document.getElementById('rb-phone').value.trim();
  const date=document.getElementById('rb-date').value;
  const startTime=document.getElementById('rb-start').value;
  const endTime=document.getElementById('rb-end').value;
  if(!customerName||!customerPhone||!date||!startTime||!endTime){
    showToast('必須項目を入力してください');return;
  }

  // クラス時間との重複を確認（管理者は上書き可能・確認のみ）
  const dow=new Date(date).getDay();
  const dayClasses=classSchedule.filter(c=>c.dow===dow);
  const conflictClass=dayClasses.find(c=>timeRangesOverlap(startTime,endTime,c.start,c.end));
  if(conflictClass){
    const proceed=confirm(`この時間帯は道場クラス「${conflictClass.name}」（${conflictClass.start}-${conflictClass.end}）と重なっています。\nそれでも登録しますか？`);
    if(!proceed) return;
  }

  const data={
    customerName,customerPhone,
    customerEmail:document.getElementById('rb-email').value.trim(),
    date,startTime,endTime,
    purpose:document.getElementById('rb-purpose').value,
    price:parseInt(document.getElementById('rb-price').value)||0,
    bookingStatus:document.getElementById('rb-booking-status').value,
    paymentStatus:document.getElementById('rb-payment-status').value,
    paymentMethod:document.getElementById('rb-payment-method').value,
    accessCode:document.getElementById('rb-access-code').value.trim(),
    accessCodeStatus:document.getElementById('rb-access-status').value,
    notes:document.getElementById('rb-note').value.trim(),
  };
  if(editingRentalId){
    const idx=rentalBookings.findIndex(b=>b.id===editingRentalId);
    if(idx!==-1) rentalBookings[idx]={...rentalBookings[idx],...data};
    showToast('予約を更新しました');
  } else {
    rentalBookings.push({id:'rb-'+Date.now(),...data,createdAt:new Date().toISOString()});
    showToast('予約を登録しました');
  }
  saveAll();
  closeRentalModal();
  renderRentalBookings(rentalBookings);
}

function openRentalDeleteModal(id){
  deletingRentalId=id;
  const b=rentalBookings.find(x=>x.id===id);
  document.getElementById('rental-delete-name').textContent=b?`${b.date} ${b.customerName}`:'';
  document.getElementById('modal-rental-delete').classList.add('open');
}
function deleteRentalBooking(){
  if(!deletingRentalId) return;
  rentalBookings=rentalBookings.filter(b=>b.id!==deletingRentalId);
  saveAll();
  document.getElementById('modal-rental-delete').classList.remove('open');
  deletingRentalId=null;
  renderRentalBookings(rentalBookings);
  showToast('予約を削除しました');
}

// ── RENTAL CALENDAR ──
function initRentalCalendar(){
  if(rentalCalYear===undefined){
    const now=new Date();
    rentalCalYear=now.getFullYear();rentalCalMonth=now.getMonth();
  }
}
function changeRentalCalMonth(diff){
  rentalCalMonth+=diff;
  if(rentalCalMonth<0){rentalCalMonth=11;rentalCalYear--;}
  if(rentalCalMonth>11){rentalCalMonth=0;rentalCalYear++;}
  renderRentalCalendar();
}
function goToRentalToday(){
  const now=new Date();
  rentalCalYear=now.getFullYear();rentalCalMonth=now.getMonth();
  renderRentalCalendar();
}
function renderRentalCalendar(){
  const label=document.getElementById('r-cal-month-label');
  if(!label) return;
  label.textContent=`${rentalCalYear}.${String(rentalCalMonth+1).padStart(2,'0')}`;
  const firstDay=new Date(rentalCalYear,rentalCalMonth,1).getDay();
  const days=new Date(rentalCalYear,rentalCalMonth+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${rentalCalYear}-${String(rentalCalMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayBookings=rentalBookings.filter(b=>b.date===ds).sort((a,b)=>a.startTime.localeCompare(b.startTime));
    const dow=new Date(ds).getDay();
    const dayClasses=classSchedule.filter(c=>c.dow===dow);
    const classChips=dayClasses.map(c=>
      `<div class="cal-booking-chip" style="background:#eef2ff;color:#3a5fc8;" title="${c.name} ${c.start}-${c.end}">${c.start} ${c.name}</div>`
    ).join('');
    const chips=dayBookings.slice(0,2).map(b=>
      `<div class="cal-booking-chip${b.bookingStatus==='cancelled'?' cancelled':''}" title="${b.customerName} ${b.startTime}-${b.endTime}">${b.startTime} ${b.customerName}</div>`
    ).join('');
    const more=dayBookings.length>2?`<div style="font-size:9px;color:var(--text-muted);">+${dayBookings.length-2}件</div>`:'';
    cells+=`<div class="cal-cell${ds===todayStr?' today':''}" onclick="showPage('rental',document.getElementById('rtab-list'));showRentalView('list',document.getElementById('rtab-list'));openRentalModal('add')">
      <div class="cal-date-num">${d}</div>${classChips}${chips}${more}
    </div>`;
  }
  document.getElementById('r-cal-grid').innerHTML=cells;
}

// ── RENTAL PAYMENT ──
function renderRentalPayment(){
  const confirmed=rentalBookings.filter(b=>b.bookingStatus!=='cancelled');
  const paid=confirmed.filter(b=>b.paymentStatus==='paid');
  const unpaid=confirmed.filter(b=>b.paymentStatus==='unpaid');
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  document.getElementById('r-pay-total-paid').textContent=paid.reduce((s,b)=>s+(b.price||0),0).toLocaleString();
  document.getElementById('r-pay-unpaid-count').textContent=unpaid.length;
  document.getElementById('r-pay-unpaid-total').textContent=unpaid.reduce((s,b)=>s+(b.price||0),0).toLocaleString();
  document.getElementById('r-pay-month-confirmed').textContent=rentalBookings.filter(b=>b.bookingStatus==='confirmed'&&b.date&&b.date.startsWith(ym)).length;

  const tbody=document.getElementById('r-pay-tbody');
  const empty=document.getElementById('empty-r-payment');
  const sorted=[...confirmed].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=sorted.map(b=>`
    <tr>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;">${b.date}</td>
      <td style="font-weight:500;">${b.customerName}</td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:16px;">¥${(b.price||0).toLocaleString()}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${paymentMethodLabel[b.paymentMethod]||'―'}</td>
      <td><span class="status-pill ps-${b.paymentStatus}">${paymentStatusLabel[b.paymentStatus]||b.paymentStatus}</span></td>
      <td><div class="action-btns">
        ${b.paymentStatus!=='paid'?`<button class="btn btn-success btn-sm" onclick="markRentalPaid('${b.id}','paid')">支払い確認</button>`:''}
        ${b.paymentStatus==='paid'?`<button class="btn btn-ghost btn-sm" onclick="markRentalPaid('${b.id}','unpaid')">取消</button>`:''}
      </div></td>
    </tr>`).join('');
}
function markRentalPaid(id,status){
  const idx=rentalBookings.findIndex(b=>b.id===id);
  if(idx!==-1) rentalBookings[idx].paymentStatus=status;
  saveAll();
  renderRentalPayment();
  showToast(status==='paid'?'支払いを確認しました':'支払い確認を取消しました');
}

// ══ TRIAL / VISITOR MANAGEMENT ══
const trialTypeLabel={trial:'体験',visitor:'ビジター'};
const trialConvertedLabel={pending:'検討中',yes:'入会した',no:'入会しなかった'};

function filterTrial(type,el){
  trialFilter=type;
  document.querySelectorAll('#page-trial .filter-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTrialList();
}

function renderTrialList(){
  const tbody=document.getElementById('trial-tbody');
  const empty=document.getElementById('empty-trial');
  if(!tbody) return;
  const q=(document.getElementById('trial-search')?.value||'').toLowerCase();
  let data=[...trialVisitors];
  if(trialFilter!=='all') data=data.filter(t=>t.type===trialFilter);
  if(q) data=data.filter(t=>(t.name||'').toLowerCase().includes(q)||(t.phone||'').includes(q));
  data.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  if(!data.length){tbody.innerHTML='';empty.style.display='block';}
  else{
    empty.style.display='none';
    tbody.innerHTML=data.map(t=>{
      const convLabel=trialConvertedLabel[t.converted]||'検討中';
      const convCls=t.converted==='yes'?'status-active':t.converted==='no'?'status-left':'status-inactive';
      return `<tr>
        <td><span class="type-pill type-${t.type}"><span class="type-dot"></span>${trialTypeLabel[t.type]||t.type}</span></td>
        <td style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--navy);">${t.date||'―'}</td>
        <td style="font-weight:500;">${t.name}</td>
        <td style="font-size:12px;color:var(--text-secondary);">${t.phone||'―'}</td>
        <td style="font-size:12px;color:var(--text-secondary);">${t.source||'―'}${t.referrer?`<br><span style="color:var(--gold);">→ ${t.referrer}</span>`:''}${t.sourceOther?`<br><span style="color:var(--text-muted);">${t.sourceOther}</span>`:''}</td>
        <td><span class="status-pill ${convCls}">${convLabel}</span></td>
        <td><div class="action-btns">
          <button class="btn btn-ghost btn-sm" onclick="openTrialModal('edit','${t.id}')">編集</button>
          <button class="btn btn-ghost btn-sm" onclick="openTrialDeleteModal('${t.id}')">削除</button>
        </div></td>
      </tr>`;
    }).join('');
  }
  updateTrialStats();
}

function updateTrialStats(){
  const totalEl=document.getElementById('t-stat-total');
  if(!totalEl) return;
  const trials=trialVisitors.filter(t=>t.type==='trial');
  const visitors=trialVisitors.filter(t=>t.type==='visitor');
  const convertedYes=trials.filter(t=>t.converted==='yes').length;
  const convertedDecided=trials.filter(t=>t.converted==='yes'||t.converted==='no').length;
  const rate=convertedDecided?Math.round((convertedYes/convertedDecided)*100):0;
  totalEl.textContent=trialVisitors.length;
  document.getElementById('t-stat-trial').textContent=trials.length;
  document.getElementById('t-stat-visitor').textContent=visitors.length;
  document.getElementById('t-stat-conversion').textContent=rate+'%';

  // 紹介者ランキング
  const referrerWrap=document.getElementById('referrer-ranking-wrap');
  const referrerBody=document.getElementById('referrer-ranking-body');
  if(referrerWrap&&referrerBody){
    const counts={};
    trialVisitors.forEach(t=>{
      if(t.referrer){
        counts[t.referrer]=(counts[t.referrer]||0)+1;
      }
    });
    const ranked=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
    if(ranked.length){
      referrerWrap.style.display='block';
      referrerBody.innerHTML=ranked.map(([name,count],i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;${i<ranked.length-1?'border-bottom:1px solid #f4f4f4;':''}">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);min-width:24px;">${i+1}</div>
          <div style="flex:1;font-size:13px;font-weight:500;">${name}</div>
          <div style="font-size:12px;color:var(--text-secondary);">${count}名紹介</div>
        </div>`).join('');
    } else {
      referrerWrap.style.display='none';
    }
  }
}
